plugins {
        id 'com.android.application'
    }
    
    android {
        namespace 'com.autel.gimbalpro'
        compileSdk 33
    
        defaultConfig {
            applicationId "com.autel.gimbalpro"
            minSdk 24
            targetSdk 33
            versionCode 1
            versionName "1.0"
        }
    
        buildTypes {
            release {
                minifyEnabled false
            }
        }
    }
    
    dependencies {
        implementation 'com.autel:autel-msdk:2.0.0'
        implementation 'androidx.appcompat:appcompat:1.6.1'
        implementation 'com.google.android.material:material:1.9.0'
    }
    
