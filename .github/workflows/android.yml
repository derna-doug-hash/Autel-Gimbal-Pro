name: Build Gimbal Pro APK
    
    on:
      push:
        branches: [ "main" ]
    
    jobs:
      build:
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@v4
          - name: set up JDK 17
            uses: actions/setup-java@v4
            with:
              java-version: '17'
              distribution: 'temurin'
              cache: gradle
          - name: Download Gradle Wrapper JAR
            run: |
              mkdir -p gradle/wrapper
              curl -L https://github.com/gradle/gradle/raw/v8.0.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          - name: Create gradlew script
            run: |
              printf '#!/bin/sh\n\nexec java -jar gradle/wrapper/gradle-wrapper.jar "$@"\n' > gradlew
              chmod +x gradlew
          - name: Build with Gradle
            run: ./gradlew assembleDebug
          - name: Upload APK
            uses: actions/upload-artifact@v4
            with:
              name: app-debug
              path: app/build/outputs/apk/debug/app-debug.apk
    
